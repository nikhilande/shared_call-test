name: Teams Notification test

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      workflow:
        required: true
        type: string
      status:
        required: true
        type: string
      branch:
        required: true
        type: string
      run_url:
        required: true
        type: string

    secrets:
      TEAMS_FLOW_URL:
        required: true

jobs:
  notify-test:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Teams via Power Automate
        run: |
          curl -X POST "${{ secrets.TEAMS_FLOW_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "repository": "${{ inputs.repository }}",
            "workflow": "${{ inputs.workflow }}",
            "status": "${{ inputs.status }}",
            "branch": "${{ inputs.branch }}",
            "run_url": "${{ inputs.run_url }}"
          }'